<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Shopping Store</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <header>
        <h1>My Shopping Store</h1>
    </header>

    <div class="wrapper-div">

        <div class="card">
            <img src="watch.jpeg" alt="Watch">
            <div class="card-content">
              <h2>Signature Wristwatch</h2>
            <p class="price">₹11,999</p>

            <div class="rating">
                ★★★★★ <span>(120 reviews)</span>  
            </div>
             <button>🛒 ADD TO CART</button>
            </div>

           
        </div>

        <div class="card">
            <img src="headphone.jpeg" alt="camera">
            <div class="card-content">
                 <h2>Classy Camera</h2>
            <p class="price">₹4,999</p>

            <div class="rating">
                ★★★★★ <span>(86 reviews)</span>
            </div>
            <button>🛒 ADD TO CART</button>
            </div>

           
        </div>

        <div class="card">
            <img src="handbag.jpeg" alt="Handbag">
            <div class="card-content">
                <h2>Luxury Handbag</h2>
            <p class="price">₹59,999</p>

            <div class="rating">
                ★★★★★ <span>(104 reviews)</span>
            </div>
            <button>🛒 ADD TO CART</button>
            </div>

            
        </div>

    </div>

</body>
